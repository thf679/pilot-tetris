<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilot Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game" width="300" height="600"></canvas>

  <aside class="sidebar">
    <div class="panel">
      <h2>Score</h2>
      <div id="score" class="value">0</div>
    </div>
    <div class="panel">
      <h2>Lines</h2>
      <div id="lines" class="value">0</div>
    </div>
    <div class="panel">
      <h2>Level</h2>
      <div id="level" class="value">1</div>
    </div>
    <div class="panel">
      <h2>Status</h2>
      <div id="status">Playing</div>
    </div>
    <div class="panel help">
      <h2>Controls</h2>
      <div><kbd>←</kbd> <kbd>→</kbd> Move</div>
      <div><kbd>↑</kbd> Rotate</div>
      <div><kbd>↓</kbd> Soft Drop</div>
      <div><kbd>Space</kbd> Hard Drop</div>
      <div><kbd>P</kbd> Pause</div>
      <div><kbd>R</kbd> Restart</div>
    </div>
  </aside>

  <script type="module" src="dist/main.js"></script>
</body>
</html>
